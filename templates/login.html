<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - {{ settings.get('site_name', '认知觉醒') }}</title>
    <style>
        :root {
            --primary-color: #5b8a72;
            --primary-dark: #4a7260;
            --bg-color: #faf9f7;
            --text-primary: #2c3e35;
            --text-secondary: #5a6b60;
            --border-color: #e5e2dd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        .login-card {
            background: white;
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .login-logo {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .login-title {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 0.9375rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .form-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(91, 138, 114, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 0.875rem;
            font-size: 1rem;
            font-weight: 500;
            color: white;
            background: var(--primary-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            background: var(--primary-dark);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-error {
            color: #e74c3c;
            font-size: 0.875rem;
            margin-top: 1rem;
            display: none;
        }

        .login-error.show {
            display: block;
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">{{ settings.get('site_logo', '☯') }}</div>
            <h1 class="login-title">管理员登录</h1>
            <p class="login-subtitle">{{ settings.get('site_name', '认知觉醒') }}博客后台管理系统</p>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">用户名</label>
                    <input type="text" id="username" name="username" class="form-input" 
                           placeholder="请输入用户名" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <input type="password" id="password" name="password" class="form-input" 
                           placeholder="请输入密码" required autocomplete="current-password">
                </div>

                <button type="submit" class="login-btn" id="loginBtn">登 录</button>

                <p class="login-error" id="loginError">用户名或密码错误</p>
            </form>

            <a href="/" class="back-link">← 返回博客首页</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            loginError.classList.remove('show');

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = '/admin';
                } else {
                    loginError.textContent = data.message || '登录失败';
                    loginError.classList.add('show');
                    loginBtn.disabled = false;
                    loginBtn.textContent = '登 录';
                }
            } catch (error) {
                loginError.textContent = '网络错误，请重试';
                loginError.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.textContent = '登 录';
            }
        });
    </script>
</body>
</html>
