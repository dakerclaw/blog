<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - {{ settings.get('site_name', '认知觉醒') }}</title>
    <style>
        :root {
            --primary-color: #5b8a72;
            --primary-dark: #4a7260;
            --accent-color: #c9a959;
            --bg-color: #faf9f7;
            --bg-secondary: #f5f3f0;
            --text-primary: #2c3e35;
            --text-secondary: #5a6b60;
            --text-muted: #8a9a90;
            --border-color: #e5e2dd;
            --danger-color: #e74c3c;
            --success-color: #27ae60;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        .admin-header {
            background: white;
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
        }

        .admin-logo span {
            font-size: 1.5rem;
            color: var(--primary-color);
        }

        .admin-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .admin-btn {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
        }

        .admin-btn-primary {
            background: var(--primary-color);
            color: white;
            border: none;
        }

        .admin-btn-primary:hover {
            background: var(--primary-dark);
        }

        .admin-btn-outline {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .admin-btn-outline:hover {
            background: var(--bg-secondary);
        }

        .admin-btn-danger {
            background: transparent;
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
        }

        .admin-btn-danger:hover {
            background: var(--danger-color);
            color: white;
        }

        /* Main */
        .admin-main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        /* Post List */
        .post-table {
            width: 100%;
            background: white;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .post-table th,
        .post-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .post-table th {
            background: var(--bg-secondary);
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .post-table tr:last-child td {
            border-bottom: none;
        }

        .post-table tr:hover td {
            background: var(--bg-secondary);
        }

        .post-title-cell {
            font-weight: 500;
        }

        .post-featured-badge {
            display: inline-block;
            padding: 0.125rem 0.5rem;
            background: var(--accent-color);
            color: white;
            font-size: 0.75rem;
            border-radius: 4px;
        }

        .post-status {
            display: inline-block;
            padding: 0.125rem 0.5rem;
            font-size: 0.75rem;
            border-radius: 4px;
        }

        .post-status.published {
            background: rgba(39, 174, 96, 0.1);
            color: var(--success-color);
        }

        .post-status.draft {
            background: rgba(231, 76, 60, 0.1);
            color: var(--danger-color);
        }

        .post-actions {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            padding: 0.375rem 0.75rem;
            font-size: 0.8125rem;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid var(--border-color);
            background: white;
            color: var(--text-secondary);
            transition: all 0.15s;
        }

        .action-btn:hover {
            background: var(--bg-secondary);
        }

        .action-btn.edit {
            color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .action-btn.edit:hover {
            background: var(--primary-color);
            color: white;
        }

        .action-btn.delete {
            color: var(--danger-color);
            border-color: var(--danger-color);
        }

        .action-btn.delete:hover {
            background: var(--danger-color);
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 12px;
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 1.25rem;
            color: var(--text-muted);
            border-radius: 4px;
        }

        .modal-close:hover {
            background: var(--bg-secondary);
        }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            flex: 1;
        }

        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }

        /* Form */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 0.75rem;
            font-size: 0.9375rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            outline: none;
            font-family: inherit;
            transition: border-color 0.15s;
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            border-color: var(--primary-color);
        }

        .form-textarea {
            min-height: 300px;
            resize: vertical;
            font-family: 'Fira Code', monospace;
            font-size: 0.875rem;
            line-height: 1.6;
        }

        .form-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-color);
        }

        /* Editor Toolbar */
        .editor-toolbar {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.5rem 0.625rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            flex-wrap: wrap;
        }

        .editor-toolbar .form-textarea {
            border-radius: 0 0 6px 6px;
        }

        .tb-btn {
            padding: 0.3rem 0.6rem;
            font-size: 0.8125rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: white;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .tb-btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .tb-sep {
            width: 1px;
            height: 20px;
            background: var(--border-color);
            margin: 0 0.125rem;
        }

        .editor-wrap {
            position: relative;
        }

        .editor-wrap.drag-over .form-textarea {
            border-color: var(--primary-color);
            background: rgba(91, 138, 114, 0.05);
        }

        .upload-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(91, 138, 114, 0.15);
            border: 2px dashed var(--primary-color);
            border-radius: 0 0 6px 6px;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: var(--primary-color);
            font-weight: 500;
            pointer-events: none;
        }

        .editor-wrap.drag-over .upload-overlay {
            display: flex;
        }

        .img-uploading {
            opacity: 0.5;
            pointer-events: none;
        }

        /* Preview */
        .preview-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1.5rem;
            margin-top: 1rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .preview-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .about-preview {
            font-size: 0.9375rem;
            line-height: 1.8;
        }

        .about-preview h1, .about-preview h2, .about-preview h3 {
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }

        .about-preview h1 { font-size: 1.5rem; }
        .about-preview h2 { font-size: 1.25rem; }
        .about-preview h3 { font-size: 1.125rem; }

        .about-preview p {
            margin-bottom: 1rem;
        }

        .about-preview ul, .about-preview ol {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
        }

        .about-preview li {
            margin-bottom: 0.5rem;
        }

        .about-preview blockquote {
            border-left: 4px solid var(--primary-color);
            padding-left: 1rem;
            margin: 1rem 0;
            color: var(--text-secondary);
            font-style: italic;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .post-table {
                display: block;
                overflow-x: auto;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .modal {
                margin: 1rem;
                max-height: calc(100vh - 2rem);
            }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            background: var(--text-primary);
            color: white;
            border-radius: 8px;
            font-size: 0.9375rem;
            z-index: 2000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: var(--success-color);
        }

        .toast.error {
            background: var(--danger-color);
        }
    </style>
</head>
<body>
<header class="admin-header">
        <a href="/" class="admin-logo">
            <span>{{ settings.get('site_logo', '☯') }}</span>
            <span>{{ settings.get('site_name', '认知觉醒') }}</span> · 管理后台
        </a>
        <div class="admin-actions">
            <a href="/" class="admin-btn admin-btn-outline" target="_blank">查看博客</a>
            <button class="admin-btn admin-btn-outline" onclick="openUsernameModal()">修改账号</button>
            <button class="admin-btn admin-btn-outline" onclick="openPasswordModal()">修改密码</button>
            <button class="admin-btn admin-btn-outline" onclick="openSettingsModal()">站点设置</button>
            <button class="admin-btn admin-btn-outline" onclick="openAboutModal()">编辑关于</button>
            <button class="admin-btn admin-btn-primary" onclick="openPostModal()">写文章</button>
            <button class="admin-btn admin-btn-danger" onclick="logout()">退出登录</button>
        </div>
    </header>

    <main class="admin-main">
        <div class="page-header">
            <h1 class="page-title">文章管理</h1>
            <span style="color: var(--text-muted); font-size: 0.875rem;">
                共 <span id="postCount">0</span> 篇文章
            </span>
        </div>

        <div id="postList"></div>
    </main>

    <!-- Post Modal -->
    <div class="modal-overlay" id="postModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">写文章</h2>
                <button class="modal-close" onclick="closePostModal()">×</button>
            </div>
            <div class="modal-body">
                <form id="postForm">
                    <input type="hidden" id="postId">

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">标题 *</label>
                            <input type="text" id="postTitle" class="form-input" 
                                   placeholder="输入文章标题" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">标签</label>
                            <input type="text" id="postTags" class="form-input" 
                                   placeholder="用逗号分隔，如: 心理学,成长">
                            <div class="form-hint">多个标签用英文逗号分隔</div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">摘要</label>
                        <textarea id="postExcerpt" class="form-input" rows="2" 
                                  placeholder="输入文章摘要（可选）"></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">内容 (Markdown) *</label>
                        <div class="editor-toolbar" id="editorToolbar">
                            <button type="button" class="tb-btn" onclick="tbWrap('**','**')" title="加粗"><b>B</b></button>
                            <button type="button" class="tb-btn" onclick="tbWrap('*','*')" title="斜体"><i>I</i></button>
                            <div class="tb-sep"></div>
                            <button type="button" class="tb-btn" onclick="tbLine('# ')">H1</button>
                            <button type="button" class="tb-btn" onclick="tbLine('## ')">H2</button>
                            <button type="button" class="tb-btn" onclick="tbLine('### ')">H3</button>
                            <div class="tb-sep"></div>
                            <button type="button" class="tb-btn" onclick="tbLine('- ')">列表</button>
                            <button type="button" class="tb-btn" onclick="tbLine('> ')">引用</button>
                            <button type="button" class="tb-btn" onclick="tbWrap('`','`')">代码</button>
                            <div class="tb-sep"></div>
                            <button type="button" class="tb-btn" onclick="tbInsertLink()" title="插入链接">🔗 链接</button>
                            <button type="button" class="tb-btn" onclick="triggerImageUpload()" title="点击上传图片">🖼 图片</button>
                            <input type="file" id="imageFileInput" accept="image/*" style="display:none" onchange="handleImageFileSelect(this)">
                            <div class="tb-sep"></div>
                            <button type="button" class="tb-btn" onclick="triggerWordImport()" title="从Word文档导入" style="color: var(--primary-color); border-color: var(--primary-color);">📄 导入Word</button>
                            <input type="file" id="wordFileInput" accept=".docx" style="display:none" onchange="handleWordFileSelect(this)">
                        </div>
                        <div class="editor-wrap" id="editorWrap">
                            <textarea id="postContent" class="form-textarea" 
                                      placeholder="使用 Markdown 编写文章内容&#10;&#10;支持直接粘贴截图（Ctrl+V）或拖入图片自动上传" 
                                      style="border-radius:0 0 6px 6px; border-top:none" required></textarea>
                            <div class="upload-overlay">📷 松开鼠标上传图片</div>
                        </div>
                        <div class="form-hint">支持 Markdown · 可粘贴截图(Ctrl+V)或拖入图片自动上传</div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">状态</label>
                            <select id="postStatus" class="form-select">
                                <option value="published">已发布</option>
                                <option value="draft">草稿</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">&nbsp;</label>
                            <div class="checkbox-group">
                                <input type="checkbox" id="postFeatured">
                                <label for="postFeatured">设为精选文章</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">预览</label>
                        <div class="preview-container">
                            <div class="preview-title" id="previewTitle"></div>
                            <div id="previewContent"></div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="admin-btn admin-btn-outline" onclick="closePostModal()">取消</button>
                <button class="admin-btn admin-btn-primary" onclick="savePost()">保存文章</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">站点设置</h2>
                <button class="modal-close" onclick="closeSettingsModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">站名</label>
                        <input type="text" id="settingSiteName" class="form-input" placeholder="网站名称">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Logo 图标</label>
                        <input type="text" id="settingSiteLogo" class="form-input" placeholder="如：☯">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">首页大标题</label>
                    <input type="text" id="settingHeroTitle" class="form-input" placeholder="首页正中的大标题">
                </div>

                <div class="form-group">
                    <label class="form-label">副标题</label>
                    <input type="text" id="settingSiteSubtitle" class="form-input" placeholder="网站副标题">
                </div>

                <div class="form-group">
                    <label class="form-label">网站描述</label>
                    <textarea id="settingSiteDescription" class="form-input" rows="2" placeholder="网站描述（用于 SEO）"></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">关键词</label>
                    <input type="text" id="settingSiteKeywords" class="form-input" placeholder="关键词，用逗号分隔">
                </div>

                <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid var(--border-color);">

                <div class="form-group">
                    <label class="form-label">页脚标语</label>
                    <input type="text" id="settingFooterSlogan" class="form-input" placeholder="页脚标语">
                </div>

                <div class="form-group">
                    <label class="form-label">版权信息</label>
                    <input type="text" id="settingFooterCopyright" class="form-input" placeholder="如：© 2026 认知觉醒">
                </div>

                <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid var(--border-color);">

                <div class="form-group">
                    <label class="form-label">联系邮箱</label>
                    <input type="text" id="settingContactEmail" class="form-input" placeholder="联系邮箱">
                </div>

                <div class="form-group">
                    <label class="form-label">微信公众号</label>
                    <input type="text" id="settingContactWechat" class="form-input" placeholder="微信公众号名称">
                </div>

                <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid var(--border-color);">

                <div class="form-group">
                    <label class="form-label">关于页面头像</label>
                    <input type="text" id="settingAboutAvatar" class="form-input" placeholder="如：☯">
                </div>

                <div class="form-group">
                    <label class="form-label">关于页面标题</label>
                    <input type="text" id="settingAboutTitle" class="form-input" placeholder="如：关于「认知觉醒」">
                </div>

                <div class="form-group">
                    <label class="form-label">关于页面副标题</label>
                    <input type="text" id="settingAboutSubtitle" class="form-input" placeholder="关于页面副标题">
                </div>
            </div>
            <div class="modal-footer">
                <button class="admin-btn admin-btn-outline" onclick="closeSettingsModal()">取消</button>
                <button class="admin-btn admin-btn-primary" onclick="saveSettings()">保存设置</button>
            </div>
        </div>
    </div>

    <!-- About Modal -->
    <div class="modal-overlay" id="aboutModal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">编辑关于页面</h2>
                <button class="modal-close" onclick="closeAboutModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">内容 (Markdown)</label>
                    <textarea id="aboutContent" class="form-textarea" 
                              placeholder="使用 Markdown 编写关于页面的内容" style="min-height: 400px;"></textarea>
                    <div class="form-hint">支持 Markdown 语法，包括标题、列表、引用、链接等</div>
                </div>

                <div class="form-group">
                    <label class="form-label">预览</label>
                    <div class="preview-container">
                        <div class="about-preview" id="aboutPreview"></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="admin-btn admin-btn-outline" onclick="closeAboutModal()">取消</button>
                <button class="admin-btn admin-btn-primary" onclick="saveAbout()">保存</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        const API_BASE = '/api/admin';
        let posts = [];
        let editingId = null;

        // Initialize marked
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Load posts
        async function loadPosts() {
            try {
                const response = await fetch(`${API_BASE}/posts`);
                posts = await response.json();
                renderPostList();
            } catch (error) {
                showToast('加载文章失败', 'error');
            }
        }

        // Render post list
        function renderPostList() {
            const container = document.getElementById('postList');
            document.getElementById('postCount').textContent = posts.length;

            if (posts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>还没有文章，<a href="#" onclick="openPostModal(); return false;">写一篇吧</a></p>
                    </div>
                `;
                return;
            }

            const html = `
                <table class="post-table">
                    <thead>
                        <tr>
                            <th style="width: 40%">标题</th>
                            <th>状态</th>
                            <th>标签</th>
                            <th>浏览</th>
                            <th>日期</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${posts.map(post => `
                            <tr>
                                <td class="post-title-cell">
                                    ${post.title}
                                    ${post.featured ? '<span class="post-featured-badge">精选</span>' : ''}
                                </td>
                                <td>
                                    <span class="post-status ${post.status}">${post.status === 'published' ? '已发布' : '草稿'}</span>
                                </td>
                                <td>${(post.tags || '').split(',').filter(t => t).join(', ')}</td>
                                <td>${post.views}</td>
                                <td>${new Date(post.created_at).toLocaleDateString('zh-CN')}</td>
                                <td class="post-actions">
                                    <button class="action-btn edit" onclick="editPost(${post.id})">编辑</button>
                                    <button class="action-btn delete" onclick="deletePost(${post.id})">删除</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            container.innerHTML = html;
        }

        // Open post modal
        function openPostModal(post = null) {
            editingId = post ? post.id : null;
            document.getElementById('modalTitle').textContent = post ? '编辑文章' : '写文章';
            document.getElementById('postId').value = post ? post.id : '';
            document.getElementById('postTitle').value = post ? post.title : '';
            document.getElementById('postTags').value = post ? (post.tags || '') : '';
            document.getElementById('postExcerpt').value = post ? (post.excerpt || '') : '';
            document.getElementById('postContent').value = post ? post.content : '';
            document.getElementById('postStatus').value = post ? post.status : 'published';
            document.getElementById('postFeatured').checked = post ? post.featured : false;

            updatePreview();
            document.getElementById('postModal').classList.add('show');
        }

        // Close post modal
        function closePostModal() {
            document.getElementById('postModal').classList.remove('show');
            editingId = null;
        }

        // Edit post
        function editPost(id) {
            const post = posts.find(p => p.id === id);
            if (post) {
                openPostModal(post);
            }
        }

        // Save post
        async function savePost() {
            const title = document.getElementById('postTitle').value.trim();
            const content = document.getElementById('postContent').value.trim();

            if (!title || !content) {
                showToast('请填写标题和内容', 'error');
                return;
            }

            const data = {
                title,
                tags: document.getElementById('postTags').value.trim(),
                excerpt: document.getElementById('postExcerpt').value.trim(),
                content,
                status: document.getElementById('postStatus').value,
                featured: document.getElementById('postFeatured').checked ? 1 : 0
            };

            try {
                const url = editingId ? `${API_BASE}/posts/${editingId}` : `${API_BASE}/posts`;
                const method = editingId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    showToast(editingId ? '文章已更新' : '文章已保存');
                    closePostModal();
                    loadPosts();
                } else {
                    showToast('保存失败', 'error');
                }
            } catch (error) {
                showToast('网络错误', 'error');
            }
        }

        // Delete post
        async function deletePost(id) {
            if (!confirm('确定要删除这篇文章吗？')) return;

            try {
                const response = await fetch(`${API_BASE}/posts/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showToast('文章已删除');
                    loadPosts();
                } else {
                    showToast('删除失败', 'error');
                }
            } catch (error) {
                showToast('网络错误', 'error');
            }
        }

        // Update preview
        function updatePreview() {
            const title = document.getElementById('postTitle').value || '文章标题';
            const content = document.getElementById('postContent').value || '';

            document.getElementById('previewTitle').textContent = title;
            document.getElementById('previewContent').innerHTML = marked.parse(content);
        }

        // Event listeners
        document.getElementById('postTitle').addEventListener('input', updatePreview);
        document.getElementById('postContent').addEventListener('input', updatePreview);

        // Logout
        async function logout() {
            if (!confirm('确定要退出登录吗？')) return;
            try {
                await fetch(`${API_BASE}/logout`, { method: 'POST' });
                window.location.href = '/admin/login';
            } catch (error) {
                window.location.href = '/admin/login';
            }
        }

        // Close modal on overlay click
        document.getElementById('postModal').addEventListener('click', (e) => {
            if (e.target.id === 'postModal') {
                closePostModal();
            }
        });

        document.getElementById('aboutModal').addEventListener('click', (e) => {
            if (e.target.id === 'aboutModal') {
                closeAboutModal();
            }
        });

        document.getElementById('settingsModal').addEventListener('click', (e) => {
            if (e.target.id === 'settingsModal') {
                closeSettingsModal();
            }
        });

        // Settings functions
        async function openSettingsModal() {
            try {
                const response = await fetch('/api/settings');
                const settings = await response.json();
                
                document.getElementById('settingSiteName').value = settings.site_name || '';
                document.getElementById('settingSiteLogo').value = settings.site_logo || '';
                document.getElementById('settingHeroTitle').value = settings.hero_title || '';
                document.getElementById('settingSiteSubtitle').value = settings.site_subtitle || '';
                document.getElementById('settingSiteDescription').value = settings.site_description || '';
                document.getElementById('settingSiteKeywords').value = settings.site_keywords || '';
                document.getElementById('settingFooterSlogan').value = settings.footer_slogan || '';
                document.getElementById('settingFooterCopyright').value = settings.footer_copyright || '';
                document.getElementById('settingContactEmail').value = settings.contact_email || '';
                document.getElementById('settingContactWechat').value = settings.contact_wechat || '';
                document.getElementById('settingAboutAvatar').value = settings.about_avatar || '';
                document.getElementById('settingAboutTitle').value = settings.about_title || '';
                document.getElementById('settingAboutSubtitle').value = settings.about_subtitle || '';
                
                document.getElementById('settingsModal').classList.add('show');
            } catch (error) {
                showToast('加载设置失败', 'error');
            }
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.remove('show');
        }

        async function saveSettings() {
            const data = {
                site_name: document.getElementById('settingSiteName').value.trim(),
                site_logo: document.getElementById('settingSiteLogo').value.trim(),
                site_title: document.getElementById('settingSiteName').value.trim(),
                hero_title: document.getElementById('settingHeroTitle').value.trim(),
                site_subtitle: document.getElementById('settingSiteSubtitle').value.trim(),
                site_description: document.getElementById('settingSiteDescription').value.trim(),
                site_keywords: document.getElementById('settingSiteKeywords').value.trim(),
                footer_slogan: document.getElementById('settingFooterSlogan').value.trim(),
                footer_copyright: document.getElementById('settingFooterCopyright').value.trim(),
                contact_email: document.getElementById('settingContactEmail').value.trim(),
                contact_wechat: document.getElementById('settingContactWechat').value.trim(),
                about_avatar: document.getElementById('settingAboutAvatar').value.trim(),
                about_title: document.getElementById('settingAboutTitle').value.trim(),
                about_subtitle: document.getElementById('settingAboutSubtitle').value.trim()
            };

            try {
                const response = await fetch(`${API_BASE}/settings`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    showToast('设置已保存');
                    closeSettingsModal();
                    // 更新页面上的名称
                    document.getElementById('adminLogoText').textContent = data.site_name || '认知觉醒';
                } else {
                    showToast('保存失败', 'error');
                }
            } catch (error) {
                showToast('网络错误', 'error');
            }
        }

        // About page functions
        async function openAboutModal() {
            try {
                const response = await fetch('/api/about');
                const data = await response.json();
                document.getElementById('aboutContent').value = data.content || '';
                updateAboutPreview();
                document.getElementById('aboutModal').classList.add('show');
            } catch (error) {
                showToast('加载关于页面失败', 'error');
            }
        }

        function closeAboutModal() {
            document.getElementById('aboutModal').classList.remove('show');
        }

        function updateAboutPreview() {
            const content = document.getElementById('aboutContent').value || '';
            document.getElementById('aboutPreview').innerHTML = marked.parse(content);
        }

        document.getElementById('aboutContent').addEventListener('input', updateAboutPreview);

        async function saveAbout() {
            const content = document.getElementById('aboutContent').value;

            try {
                const response = await fetch(`${API_BASE}/about`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content })
                });

                if (response.ok) {
                    showToast('关于页面已保存');
                    closeAboutModal();
                } else {
                    showToast('保存失败', 'error');
                }
            } catch (error) {
                showToast('网络错误', 'error');
            }
        }

        // Load posts on page load
        loadPosts();

        // ============================================================
        // 编辑器工具栏 & 图片上传
        // ============================================================

        const contentEl = () => document.getElementById('postContent');

        /** 在光标处插入文本 */
        function insertAtCursor(text) {
            const el = contentEl();
            const start = el.selectionStart;
            const end = el.selectionEnd;
            el.value = el.value.substring(0, start) + text + el.value.substring(end);
            el.selectionStart = el.selectionEnd = start + text.length;
            el.focus();
            updatePreview();
        }

        /** 包裹选中文字 */
        function tbWrap(before, after) {
            const el = contentEl();
            const start = el.selectionStart;
            const end = el.selectionEnd;
            const selected = el.value.substring(start, end) || '文字';
            const newText = before + selected + after;
            el.value = el.value.substring(0, start) + newText + el.value.substring(end);
            el.selectionStart = start + before.length;
            el.selectionEnd = start + before.length + selected.length;
            el.focus();
            updatePreview();
        }

        /** 在行首插入前缀 */
        function tbLine(prefix) {
            const el = contentEl();
            const start = el.selectionStart;
            const lineStart = el.value.lastIndexOf('\n', start - 1) + 1;
            el.value = el.value.substring(0, lineStart) + prefix + el.value.substring(lineStart);
            el.selectionStart = el.selectionEnd = start + prefix.length;
            el.focus();
            updatePreview();
        }

        /** 插入链接 */
        function tbInsertLink() {
            const url = prompt('输入链接地址：', 'https://');
            if (url) {
                const el = contentEl();
                const start = el.selectionStart;
                const end = el.selectionEnd;
                const text = el.value.substring(start, end) || '链接文字';
                const md = `[${text}](${url})`;
                el.value = el.value.substring(0, start) + md + el.value.substring(end);
                el.selectionStart = el.selectionEnd = start + md.length;
                el.focus();
                updatePreview();
            }
        }

        /** 触发文件选择 */
        function triggerImageUpload() {
            document.getElementById('imageFileInput').click();
        }

        /** 处理文件选择上传 */
        function handleImageFileSelect(input) {
            if (input.files && input.files[0]) {
                uploadImageFile(input.files[0]);
                input.value = '';
            }
        }

        /** 上传图片并插入 Markdown */
        async function uploadImageFile(file) {
            if (!file.type.startsWith('image/')) {
                showToast('请选择图片文件', 'error');
                return;
            }

            const el = contentEl();
            const placeholder = `![上传中...](uploading)`;
            const cursorPos = el.selectionStart;
            insertAtCursor(placeholder);
            el.classList.add('img-uploading');

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/admin/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.success) {
                    // 替换占位符
                    const altText = file.name.replace(/\.[^.]+$/, '') || 'image';
                    el.value = el.value.replace(placeholder, `![${altText}](${data.url})`);
                    updatePreview();
                    showToast('图片上传成功');
                } else {
                    el.value = el.value.replace(placeholder, '');
                    showToast(data.message || '上传失败', 'error');
                }
            } catch (err) {
                el.value = el.value.replace(placeholder, '');
                showToast('上传出错', 'error');
            } finally {
                el.classList.remove('img-uploading');
                updatePreview();
            }
        }

        // 粘贴图片 (Ctrl+V)
        document.addEventListener('paste', function(e) {
            // 仅在文章编辑器 Modal 打开时处理
            if (!document.getElementById('postModal').classList.contains('show')) return;
            const items = e.clipboardData && e.clipboardData.items;
            if (!items) return;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.startsWith('image/')) {
                    e.preventDefault();
                    uploadImageFile(items[i].getAsFile());
                    break;
                }
            }
        });

        // 拖拽图片
        const editorWrap = document.getElementById('editorWrap');

        editorWrap.addEventListener('dragover', (e) => {
            e.preventDefault();
            editorWrap.classList.add('drag-over');
        });

        editorWrap.addEventListener('dragleave', (e) => {
            if (!editorWrap.contains(e.relatedTarget)) {
                editorWrap.classList.remove('drag-over');
            }
        });

        editorWrap.addEventListener('drop', (e) => {
            e.preventDefault();
            editorWrap.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            for (let i = 0; i < files.length; i++) {
                if (files[i].type.startsWith('image/')) {
                    uploadImageFile(files[i]);
                }
            }
        });

        // Word文档导入
        function triggerWordImport() {
            document.getElementById('wordFileInput').click();
        }

        function handleWordFileSelect(input) {
            if (input.files && input.files[0]) {
                importWordFile(input.files[0]);
                input.value = '';
            }
        }

        async function importWordFile(file) {
            if (!file.name.endsWith('.docx')) {
                showToast('只支持 .docx 格式', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/admin/import-word', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.success) {
                    // 确认是否替换现有内容
                    const existingContent = document.getElementById('postContent').value.trim();
                    if (existingContent) {
                        if (!confirm('导入将替换现有内容，确定继续吗？')) {
                            return;
                        }
                    }

                    // 填充标题和内容
                    if (!document.getElementById('postTitle').value.trim()) {
                        document.getElementById('postTitle').value = data.title || '';
                    }
                    document.getElementById('postContent').value = data.content || '';
                    updatePreview();
                    showToast('Word文档导入成功');
                } else {
                    showToast(data.message || '导入失败', 'error');
                }
            } catch (err) {
                showToast('导入出错', 'error');
            }
        }

        // Password Modal Functions
        function openPasswordModal() {
            document.getElementById('passwordModal').style.display = 'flex';
            document.getElementById('oldPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        }

        function closePasswordModal() {
            document.getElementById('passwordModal').style.display = 'none';
        }

        async function savePassword() {
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!oldPassword || !newPassword || !confirmPassword) {
                showToast('请填写所有字段', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showToast('两次输入的新密码不一致', 'error');
                return;
            }

            if (newPassword.length < 6) {
                showToast('新密码长度不能少于6位', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/password`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ oldPassword, newPassword })
                });

                const data = await response.json();

if (response.ok) {
                    showToast('密码修改成功');
                    closePasswordModal();
                } else {
                    showToast(data.message || '修改失败', 'error');
                }
            } catch (error) {
                showToast('网络错误', 'error');
            }
        }

        // Username Modal Functions
        function openUsernameModal() {
            document.getElementById('usernameModal').style.display = 'flex';
            document.getElementById('newUsername').value = '';
            document.getElementById('usernamePassword').value = '';
        }

        function closeUsernameModal() {
            document.getElementById('usernameModal').style.display = 'none';
        }

        async function saveUsername() {
            const newUsername = document.getElementById('newUsername').value;
            const password = document.getElementById('usernamePassword').value;

            if (!newUsername || !password) {
                showToast('请填写所有字段', 'error');
                return;
            }

            if (newUsername.length < 3) {
                showToast('用户名长度不能少于3位', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/username`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: newUsername, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showToast('用户名修改成功');
                    closeUsernameModal();
                } else {
                    showToast(data.message || '修改失败', 'error');
                }
            } catch (error) {
                showToast('网络错误', 'error');
            }
        }
    </script>
